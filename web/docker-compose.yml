services:
  postgres:
    image: postgres:16-alpine
    container_name: stayreviewr-postgres
    environment:
      POSTGRES_DB: stayreviewr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - stayreviewr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stayreviewr"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: stayreviewr-redis
    ports:
      - "6379:6379"
    volumes:
      - stayreviewr-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  stayreviewr-postgres-data:
  stayreviewr-redis-data:
